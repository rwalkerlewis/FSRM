# =============================================================================
# Build and Push CI Docker Image
# =============================================================================
# Builds the FSRM CI environment image (Dockerfile.ci) and pushes it to
# GitHub Container Registry (ghcr.io). This image contains all build
# dependencies (PETSc, MPI, HDF5, GTest, etc.) and is used by the main
# CI workflow as the container for all build and test jobs.
#
# The image is only rebuilt when Dockerfile.ci or this workflow changes,
# or when manually triggered. PETSc builds from source (~15-30 min) so
# Docker layer caching via Buildx is critical for performance.
# =============================================================================

name: Build CI Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.ci'
      - '.github/workflows/docker-ci-image.yml'
  workflow_dispatch:
    # Allow manual trigger for initial bootstrap and forced rebuilds

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fsrm-ci

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push CI Image
    runs-on: ubuntu-latest
    timeout-minutes: 60  # PETSc build can take 15-30 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "## CI Docker Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This image is used by the CI workflow (\`.github/workflows/ci.yml\`) as the" >> $GITHUB_STEP_SUMMARY
          echo "build and test container. It contains PETSc 3.20, OpenMPI, HDF5, GTest," >> $GITHUB_STEP_SUMMARY
          echo "and all other build dependencies." >> $GITHUB_STEP_SUMMARY
