# =============================================================================
# FSRM Continuous Integration
# =============================================================================
# Docker-based CI pipeline that builds FSRM and runs tests in stages.
# All build/test jobs run inside the pre-built CI Docker image from ghcr.io,
# which contains PETSc 3.20, OpenMPI, HDF5, GTest, and all other dependencies.
#
# Pipeline structure (fail-fast):
#   Build → Unit Tests ──────────┬── Integration Tests
#         → Functional Tests ────┤
#         → Physics/MMS Tests    ├── Performance Tests (main only)
#         → Disabled Test Report │
#                                └── Summary (always)
#
# Prerequisites:
#   The CI Docker image must be built first. Run the "Build CI Docker Image"
#   workflow (docker-ci-image.yml) via workflow_dispatch before the first run.
# =============================================================================

name: FSRM CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_IMAGE: ghcr.io/rwalkerlewis/fsrm-ci:latest
  BUILD_TYPE: Release

permissions:
  contents: read
  packages: read

# =============================================================================
# Jobs
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTING=ON \
            -DENABLE_CUDA=OFF \
            -DBUILD_EXAMPLES=ON \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: |
          cd build
          make -j$(nproc) 2>&1 | tee build.log

      - name: Count compiler warnings
        if: always()
        run: |
          chmod +x scripts/ci/count_warnings.sh
          ./scripts/ci/count_warnings.sh build/build.log || true

      - name: Verify build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -lh build/fsrm
          ls -lh build/libfsrmlib.so
          echo ""
          echo "=== Test executables ==="
          ls -lh build/tests/run_all_tests
          ls -lh build/tests/run_unit_tests
          ls -lh build/tests/run_functional_tests
          ls -lh build/tests/run_physics_tests
          ls -lh build/tests/run_integration_tests
          ls -lh build/tests/run_performance_tests
          echo ""
          echo "✅ All build artifacts present"

      - name: Package build artifacts
        run: |
          # Create a tarball of the build directory for downstream jobs.
          # Exclude .o object files to reduce size. Keep everything else
          # (CTestTestfile.cmake, CMakeCache.txt, etc.) so ctest works.
          tar czf build-artifacts.tar.gz \
            --exclude='*.o' \
            --exclude='*.obj' \
            build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests (depends on Build, fast feedback)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract build artifacts
        run: tar xzf build-artifacts.tar.gz

      - name: Fix shared library permissions
        run: chmod +x build/tests/run_* build/fsrm build/libfsrmlib.so 2>/dev/null || true

      - name: Run unit tests
        working-directory: build
        run: |
          echo "=== Running Unit Tests ==="
          ctest -L "unit" --output-on-failure --timeout 120 --output-junit unit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: build/unit-results.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Functional Tests (depends on Build, parallel with Unit)
  # ---------------------------------------------------------------------------
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract build artifacts
        run: tar xzf build-artifacts.tar.gz

      - name: Fix shared library permissions
        run: chmod +x build/tests/run_* build/fsrm build/libfsrmlib.so 2>/dev/null || true

      - name: Run functional tests
        working-directory: build
        run: |
          echo "=== Running Functional Tests ==="
          ctest -L "functional" --output-on-failure --timeout 180 --output-junit functional-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-results
          path: build/functional-results.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: Physics/MMS Tests (depends on Build, parallel with Unit)
  # ---------------------------------------------------------------------------
  physics-tests:
    name: Physics Tests
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract build artifacts
        run: tar xzf build-artifacts.tar.gz

      - name: Fix shared library permissions
        run: chmod +x build/tests/run_* build/fsrm build/libfsrmlib.so 2>/dev/null || true

      - name: Run physics/MMS tests
        working-directory: build
        run: |
          echo "=== Running Physics/MMS Tests ==="
          ctest -L "physics" --output-on-failure --timeout 300 --output-junit physics-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physics-test-results
          path: build/physics-results.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Integration Tests (depends on Unit + Functional passing)
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests]
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract build artifacts
        run: tar xzf build-artifacts.tar.gz

      - name: Fix shared library permissions
        run: chmod +x build/tests/run_* build/fsrm build/libfsrmlib.so 2>/dev/null || true

      - name: Run integration tests
        working-directory: build
        run: |
          echo "=== Running Integration Tests ==="
          ctest -L "integration" --output-on-failure --timeout 600 --output-junit integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: build/integration-results.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 6: Performance Tests (main branch only, depends on Unit + Functional)
  # ---------------------------------------------------------------------------
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    container:
      image: ghcr.io/rwalkerlewis/fsrm-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract build artifacts
        run: tar xzf build-artifacts.tar.gz

      - name: Fix shared library permissions
        run: chmod +x build/tests/run_* build/fsrm build/libfsrmlib.so 2>/dev/null || true

      - name: Run performance tests
        working-directory: build
        run: |
          echo "=== Running Performance Tests ==="
          ctest -L "performance" --output-on-failure --timeout 900 --output-junit performance-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: build/performance-results.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 7: Disabled Test Tracking (informational)
  # ---------------------------------------------------------------------------
  disabled-test-report:
    name: Disabled Test Report
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Report disabled tests
        run: |
          chmod +x scripts/ci/check_disabled_tests.sh
          ./scripts/ci/check_disabled_tests.sh tests/CMakeLists.txt

  # ---------------------------------------------------------------------------
  # Job 8: Summary (always runs, reports overall status)
  # ---------------------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, unit-tests, functional-tests, physics-tests, integration-tests]
    if: always()

    steps:
      - name: Evaluate results
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | \`${{ needs.build.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | \`${{ needs.unit-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Functional Tests | \`${{ needs.functional-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Physics Tests | \`${{ needs.physics-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | \`${{ needs.integration-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check all required jobs passed
          FAILED=0

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed or was skipped" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          fi

          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed or were skipped" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          fi

          if [ "${{ needs.functional-tests.result }}" != "success" ]; then
            echo "❌ Functional tests failed or were skipped" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          fi

          if [ "${{ needs.physics-tests.result }}" != "success" ]; then
            echo "❌ Physics tests failed or were skipped" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          fi

          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed or were skipped" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All required CI checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**One or more required checks failed. See individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
