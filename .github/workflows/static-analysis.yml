# =============================================================================
# Static Analysis
# =============================================================================
# Runs static analysis tools on pull requests to main. Currently runs cppcheck
# only (does not require PETSc or a compilation database).
#
# This workflow is INFORMATIONAL ONLY — it does not block merges.
# To promote to a blocking check, add "Static Analysis / cppcheck" to the
# required status checks in branch protection settings.
#
# clang-tidy is not run in CI because it requires a compile_commands.json
# which depends on PETSc being available. A .clang-tidy config is provided
# in the repository root for local developer use.
# =============================================================================

name: Static Analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          echo "## Static Analysis: cppcheck" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run cppcheck with moderate checks enabled.
          # --suppress=missingInclude: PETSc/MPI/HDF5 headers not available on runner
          # --suppress=unknownMacro: PETSc macros (PetscCall, PetscCheck, etc.)
          # --error-exitcode=0: Do not fail the job (informational only)
          cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            --std=c++17 \
            --language=c++ \
            --error-exitcode=0 \
            --template='{file}:{line}: {severity}: {message} [{id}]' \
            --xml --xml-version=2 \
            -I include/ \
            src/ include/ \
            2> cppcheck-results.xml \
            | tee cppcheck-stdout.txt || true

          # Count findings by severity
          ERRORS=$(grep -c 'severity="error"' cppcheck-results.xml 2>/dev/null || echo "0")
          WARNINGS=$(grep -c 'severity="warning"' cppcheck-results.xml 2>/dev/null || echo "0")
          STYLE=$(grep -c 'severity="style"' cppcheck-results.xml 2>/dev/null || echo "0")
          PERF=$(grep -c 'severity="performance"' cppcheck-results.xml 2>/dev/null || echo "0")
          PORT=$(grep -c 'severity="portability"' cppcheck-results.xml 2>/dev/null || echo "0")

          TOTAL=$((ERRORS + WARNINGS + STYLE + PERF + PORT))

          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No issues found." >> $GITHUB_STEP_SUMMARY
          else
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|------:|" >> $GITHUB_STEP_SUMMARY
            echo "| Error | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Warning | $WARNINGS |" >> $GITHUB_STEP_SUMMARY
            echo "| Style | $STYLE |" >> $GITHUB_STEP_SUMMARY
            echo "| Performance | $PERF |" >> $GITHUB_STEP_SUMMARY
            echo "| Portability | $PORT |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*This check is informational and does not block merges.*" >> $GITHUB_STEP_SUMMARY

      - name: Upload cppcheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-results
          path: cppcheck-results.xml
          retention-days: 14
